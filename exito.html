<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago Exitoso</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}
.card {
  background: #1e293b;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
h1 {
  color: #22c55e;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
button:hover {
  background: #2563eb;
}
</style>
</head>
<body>

<div class="card">
  <h1>✅ Pago realizado con éxito</h1>
  <p>Tu intención de compra ha sido registrada correctamente.</p>
  <button onclick="window.location.href='/'">Volver al inicio</button>
</div>

</body>
</html>
